<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>教师端 - TRTC 实时语音翻译</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .fullscreen-mode { padding: 24px; }
    .fullscreen-mode .container { max-width: 800px; margin: 0 auto; }
    .fullscreen-mode .card { background: #111827; border: 1px solid #334155; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .fullscreen-mode .btn-group { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; align-items: center; }
    .fullscreen-mode button, .fullscreen-mode input {
      background: #3b82f6; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-size: 18px; cursor: pointer;
    }
    .fullscreen-mode button:disabled { background: #1e293b; cursor: not-allowed; }
    .fullscreen-mode input { background: #1e293b; border: 1px solid #334155; cursor: text; width: 220px; }
    .fullscreen-mode .status { font-size: 14px; color: #94a3b8; margin-bottom: 16px; }
    .fullscreen-mode .source-text { font-size: 28px; font-weight: 700; margin: 12px 0; line-height: 1.4; background: #0f172a; padding: 12px; border-radius: 16px; border-left: 4px solid #3b82f6; }
    .fullscreen-mode .translated-text { font-size: 20px; color: #cbd5e1; margin: 8px 0 16px; background: #0f172a; padding: 12px; border-radius: 16px; border-left: 4px solid #10b981; }
    .fullscreen-mode .history { max-height: 400px; overflow-y: auto; }
    .fullscreen-mode .history-item { border-top: 1px solid #1f2937; padding: 12px 0; }
    .fullscreen-mode .small { font-size: 12px; color: #64748b; }
    .qr-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .qr-container .qr-desc { font-size: 14px; color: #94a3b8; text-align: center; }
    .student-url-text { font-size: 12px; word-break: break-all; background: #0f172a; padding: 8px; border-radius: 8px; margin-top: 8px; }
    .copy-btn { background: #334155; border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 14px; cursor: pointer; margin-top: 8px; }
    .new-session-btn { background: #10b981 !important; }
    .session-info { background: #1e293b; padding: 12px; border-radius: 12px; margin-top: 12px; font-size: 14px; word-break: break-all; }
  </style>
</head>
<body>
<div id="fullscreenContainer" class="fullscreen-mode">
  <div class="container">
    <div class="card">
      <h1>🎤 实时语音翻译教师端 (TRTC)</h1>
      <p class="small">使用麦克风进行实时语音识别+翻译，广播至所有学生端</p>

      <div class="btn-group">
        <button id="startBtn" style="background:#10b981;" disabled>🎙️ 开始上课 / Start Class</button>
        <button id="stopBtn" disabled>⏹️ 结束课程 / End Class</button>
        <select id="targetLanguages" multiple size="3" style="background:#1e293b; border:1px solid #334155; color:white; padding:6px; border-radius:16px;">
          <option value="en" selected>English</option>
          <option value="th">ไทย</option>
          <option value="lo">ພາສາລາວ</option>
          <option value="vi">Tiếng Việt</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="ms">Bahasa Melayu</option>
          <option value="fr">Français</option>
          <option value="ja">日本語</option>
          <option value="ru">Русский</option>
          <option value="ko">한국어</option>
          <option value="ur">اردو</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="pt">Português</option>
          <option value="zh">中文</option>
        </select>
        <input type="text" id="manualText" placeholder="手动输入文字 / Type here">
        <button id="manualSendBtn" style="background:#3b82f6;">📤 发送 / Send</button>
        <button id="newSessionBtn" class="new-session-btn">🆕 新课程 / New Session</button>
      </div>

      <div class="status" id="status">⚪ 未开始上课</div>
      <div id="sessionInfo" class="session-info" style="display: none;">
        <strong>当前课程码：</strong> <span id="currentSessionCode"></span><br>
        <strong>学生端链接：</strong> <span id="studentLink"></span>
        <button id="copyStudentLink" class="copy-btn" style="margin-top: 8px;">复制链接</button>
      </div>

      <div class="card">
        <div class="small">识别原文</div>
        <div id="sourceText" class="source-text">等待语音输入...</div>
        <div class="small">翻译结果（默认语言）</div>
        <div id="translatedText" class="translated-text">---</div>
      </div>
    </div>

    <div class="card">
      <div class="small">📱 学生端入口</div>
      <div class="qr-container">
        <div id="qrcode" style="width: 160px; height: 160px;"></div>
        <div class="qr-desc" id="qrDesc">正在生成二维码...</div>
        <div id="studentUrlText" class="student-url-text" style="display: none;"></div>
        <button id="copyUrlBtn" class="copy-btn" style="display: none;">复制链接</button>
      </div>
    </div>

    <div class="card">
      <div class="small">历史记录</div>
      <div id="history" class="history"></div>
    </div>
  </div>
</div>

<script>
let trtc = null;
let isTeaching = false;
let currentSession = localStorage.getItem('teacher_session') || null;
let currentTaskId = null;
let localHistory = [];
let currentSubtitleState = { sourceText: '', translations: {}, ended: true, roundId: '' };

let sourceTextDiv = document.getElementById('sourceText');
let translatedTextDiv = document.getElementById('translatedText');
let historyDiv = document.getElementById('history');
let startBtn = document.getElementById('startBtn');
let stopBtn = document.getElementById('stopBtn');
let newSessionBtn = document.getElementById('newSessionBtn');
let sessionInfoDiv = document.getElementById('sessionInfo');
let currentSessionCodeSpan = document.getElementById('currentSessionCode');
let studentLinkSpan = document.getElementById('studentLink');
let copyStudentLinkBtn = document.getElementById('copyStudentLink');
let manualText = document.getElementById('manualText');
let manualSendBtn = document.getElementById('manualSendBtn');
let targetLanguagesSelect = document.getElementById('targetLanguages');
let statusDiv = document.getElementById('status');

const GET_USERSIG_URL = 'https://1311686407-07zu5h43g1.ap-guangzhou.tencentscf.com';
const START_AI_URL = 'https://1311686407-jpi1vwtz9x.ap-guangzhou.tencentscf.com';
const STOP_AI_URL = 'https://1311686407-0hao9da3yt.ap-guangzhou.tencentscf.com';
const SDKAPPID = 1600133369;


function getTeacherPreviewTranslation(translations) {
  const map = translations || {};
  const preferred = Array.from(targetLanguagesSelect.selectedOptions).map(function(opt) {
    return opt.value;
  })[0];
  return (preferred && map[preferred]) || Object.values(map)[0] || '';
}

function maybeParseJson(value) {
  if (typeof value !== 'string') return value;
  const trimmed = value.trim();
  if (!trimmed) return value;
  const maybeJson = (trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'));
  if (!maybeJson) return value;
  try {
    return JSON.parse(trimmed);
  } catch (e) {
    return value;
  }
}

function decodeCustomMessageData(data) {
  if (!data) return null;
  try {
    if (data instanceof ArrayBuffer) {
      const decoded = new TextDecoder().decode(data);
      return maybeParseJson(decoded);
    }
    if (ArrayBuffer.isView(data)) {
      const decoded = new TextDecoder().decode(data);
      return maybeParseJson(decoded);
    }
    if (typeof data === 'string') {
      return maybeParseJson(data);
    }
    return data;
  } catch (e) {
    console.warn('CUSTOM_MESSAGE decode failed', e, data);
    return null;
  }
}

function normalizeAiSubtitleMessage(raw) {
  let msg = raw;
  for (let depth = 0; depth < 3; depth++) {
    msg = maybeParseJson(msg);
    if (!msg || typeof msg !== 'object') break;

    if (typeof msg.payload === 'string') {
      msg.payload = maybeParseJson(msg.payload);
    }
    for (const key of ['data', 'message', 'result', 'content', 'body']) {
      if (typeof msg[key] === 'string') {
        msg[key] = maybeParseJson(msg[key]);
      }
      if (msg[key] && typeof msg[key] === 'object' && typeof msg[key].payload === 'string') {
        msg[key].payload = maybeParseJson(msg[key].payload);
      }
    }

    const candidates = [msg, msg.data, msg.message, msg.result, msg.content, msg.body].filter(Boolean);
    for (const candidate of candidates) {
      const payload = candidate && typeof candidate.payload === 'object' ? candidate.payload : {};
      const sourceText = candidate.source_text || candidate.sourceText || candidate.text || payload.text || payload.source_text || payload.sourceText || '';
      const translationText = candidate.translation_text || candidate.translationText || candidate.translation || payload.translation_text || payload.translationText || payload.translation || '';
      const translationLanguage = candidate.translation_language || candidate.translationLanguage || candidate.lang || payload.translation_language || payload.translationLanguage || payload.lang || '';
      const translations = candidate.translations || payload.translations || {};
      const hasTranslations = translations && typeof translations === 'object' && Object.keys(translations).length > 0;
      if (sourceText || translationText || hasTranslations) {
        return {
          sourceText: String(sourceText || ''),
          translationText: String(translationText || ''),
          translationLanguage: String(translationLanguage || ''),
          translations: hasTranslations ? Object.assign({}, translations) : {},
          end: !!(payload.end ?? candidate.end),
          roundId: String(payload.roundid || payload.roundId || candidate.roundid || candidate.roundId || ''),
          raw: candidate
        };
      }
    }

    if (msg.data && typeof msg.data === 'object' && !Array.isArray(msg.data)) {
      msg = msg.data;
      continue;
    }
    break;
  }

  return {
    sourceText: '',
    translationText: '',
    translationLanguage: '',
    translations: {},
    end: false,
    roundId: '',
    raw: raw
  };
}

function renderCurrentTeacherSubtitle() {
  sourceTextDiv.textContent = currentSubtitleState.sourceText || '等待语音输入...';
  translatedTextDiv.textContent = getTeacherPreviewTranslation(currentSubtitleState.translations) || '（暂无翻译）';
}

function pushTeacherHistorySnapshot() {
  const source = (currentSubtitleState.sourceText || '').trim();
  if (!source) return;
  const translation = getTeacherPreviewTranslation(currentSubtitleState.translations) || '';
  const previous = localHistory[0];
  if (previous && previous.source === source) {
    previous.translation = translation;
    previous.timestamp = new Date().toLocaleTimeString();
  } else {
    localHistory.unshift({
      source: source,
      translation: translation,
      timestamp: new Date().toLocaleTimeString()
    });
    if (localHistory.length > 20) localHistory.pop();
  }
  renderHistory();
}

function escapeHtml(str) {
  return String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}

function renderHistory() {
  if (localHistory.length === 0) {
    historyDiv.innerHTML = '<div class="small">暂无历史记录</div>';
    return;
  }
  historyDiv.innerHTML = localHistory.map(function(item) {
    return '<div class="history-item"><strong>' + escapeHtml(item.source) + '</strong><div class="trans">' + escapeHtml(item.translation) + '</div><div class="small">' + item.timestamp + '</div></div>';
  }).join('');
}

function generateRoomId() {
  return Math.floor(10000 + Math.random() * 90000).toString();
}

async function postJson(url, params) {
  const response = await fetch(url, {
    method: 'POST',
    mode: 'cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  });

  const rawText = await response.text();
  let data = null;
  try {
    data = rawText ? JSON.parse(rawText) : null;
  } catch (e) {
    throw new Error('接口非 JSON 返回: ' + (rawText || ('HTTP ' + response.status)));
  }

  if (!response.ok) {
    throw new Error('HTTP ' + response.status + ': ' + rawText);
  }
  if (data && data.error) {
    throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));
  }
  return data;
}

async function getUserSig(userId, roomId) {
  const data = await postJson(GET_USERSIG_URL, { userId: userId, roomId: roomId });
  if (!data.userSig) throw new Error('获取 UserSig 失败');
  return data.userSig;
}

// 当前后端仍然要求收到 userSig，所以这里继续传
async function startAITranscription(roomId, userId, userSig, targetLanguages) {
  const data = await postJson(START_AI_URL, {
    roomId: roomId,
    userId: userId,
    userSig: userSig,
    targetLanguages: targetLanguages
  });
  console.log('START_AI raw response:', data);
  if (!data || !data.taskId) {
    throw new Error('启动转录失败: ' + JSON.stringify(data));
  }
  return data.taskId;
}

async function stopAITranscription(taskId) {
  await postJson(STOP_AI_URL, { taskId: taskId });
}

async function startClass() {
  if (isTeaching) return;
  if (!currentSession) {
    alert('请先创建新课程');
    return;
  }

  const roomId = parseInt(currentSession, 10);
  const userId = 'teacher_' + Date.now();

  try {
    statusDiv.textContent = '正在获取 UserSig...';
    const userSig = await getUserSig(userId, roomId);

    trtc = TRTC.create();
    trtc.on(TRTC.EVENT.CUSTOM_MESSAGE, onCustomMessage);
    await trtc.enterRoom({
      sdkAppId: SDKAPPID,
      roomId: roomId,
      scene: 'rtc',
      userId: userId,
      userSig: userSig
    });
    await trtc.startLocalAudio();

    isTeaching = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusDiv.textContent = '已进入房间，正在启动AI转录...';

    const selectedLangs = Array.from(targetLanguagesSelect.selectedOptions).map(function(opt) {
      return opt.value;
    });

    if (selectedLangs.length === 0) {
      translatedTextDiv.textContent = '请选择至少一种翻译语言';
      return;
    }

    try {
      currentTaskId = await startAITranscription(roomId, userId, userSig, selectedLangs);
      statusDiv.textContent = '🎙️ 上课中... AI转录已启动';
    } catch (aiErr) {
      console.error('AI转录启动失败:', aiErr, JSON.stringify(aiErr, Object.getOwnPropertyNames(aiErr)));
      currentTaskId = null;
      statusDiv.textContent = '已进房间，但AI转录启动失败: ' + (((aiErr && aiErr.message) || JSON.stringify(aiErr)));
    }
  } catch (err) {
    console.error('startClass failed:', err, JSON.stringify(err, Object.getOwnPropertyNames(err)));
    statusDiv.textContent = '启动失败: ' + (((err && err.message) || JSON.stringify(err)));
    if (trtc) await trtc.exitRoom().catch(function(e) { console.warn(e); });
    trtc = null;
    isTeaching = false;
    currentTaskId = null;
    startBtn.disabled = false;
    stopBtn.disabled = true;
  }
}

async function endClass() {
  try {
    if (currentTaskId) {
      await stopAITranscription(currentTaskId).catch(function(err) {
        console.warn('停止AI转录失败', err);
      });
      currentTaskId = null;
    }

    if (trtc) {
      await trtc.exitRoom().catch(function(err) {
        console.warn('退出房间失败', err);
      });
      trtc = null;
    }
  } finally {
    isTeaching = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusDiv.textContent = '⚪ 课程已结束';
  }
}

async function sendManualSubtitle() {
  const text = manualText.value.trim();
  if (!text) return;

  const firstSelectedLang = Array.from(targetLanguagesSelect.selectedOptions).map(function(opt) {
    return opt.value;
  })[0] || 'en';

  const message = { source_text: text, translations: {} };
  message.translations[firstSelectedLang] = 'Translation placeholder';

  sourceTextDiv.textContent = text;
  translatedTextDiv.textContent = message.translations[firstSelectedLang] || '（暂无翻译）';
  localHistory.unshift({
    source: text,
    translation: message.translations[firstSelectedLang] || '',
    timestamp: new Date().toLocaleTimeString()
  });
  if (localHistory.length > 20) localHistory.pop();
  renderHistory();
  manualText.value = '';
}

function onCustomMessage(event) {
  const decoded = decodeCustomMessageData(event.data);
  console.log('CUSTOM_MESSAGE decoded:', decoded);
  console.log('CUSTOM_MESSAGE decoded json:', JSON.stringify(decoded));
  if (!decoded) return;

  const normalized = normalizeAiSubtitleMessage(decoded);
  console.log('CUSTOM_MESSAGE normalized:', normalized);

  if (!normalized.sourceText && !normalized.translationText && !Object.keys(normalized.translations || {}).length) {
    console.warn('CUSTOM_MESSAGE schema not matched:', JSON.stringify(decoded));
    statusDiv.textContent = '🎙️ 上课中... 已收到AI消息，但字段结构未命中';
    return;
  }

  if (normalized.roundId && currentSubtitleState.roundId && normalized.roundId !== currentSubtitleState.roundId && !normalized.sourceText) {
    currentSubtitleState.translations = {};
  }
  if (normalized.roundId) {
    currentSubtitleState.roundId = normalized.roundId;
  }

  if (normalized.sourceText) {
    if (currentSubtitleState.ended && normalized.sourceText !== currentSubtitleState.sourceText) {
      currentSubtitleState.translations = {};
    }
    currentSubtitleState.sourceText = normalized.sourceText;
  }

  if (normalized.translationText) {
    currentSubtitleState.translations[normalized.translationLanguage || 'default'] = normalized.translationText;
  }
  if (normalized.translations && Object.keys(normalized.translations).length) {
    currentSubtitleState.translations = Object.assign({}, currentSubtitleState.translations, normalized.translations);
  }

  currentSubtitleState.ended = !!normalized.end;
  renderCurrentTeacherSubtitle();
  statusDiv.textContent = '🎙️ 上课中... 正在接收字幕';

  if (normalized.end) {
    pushTeacherHistorySnapshot();
  }
}

function buildStudentUrl(sessionCode) {
  const url = new URL(window.location.href);
  const currentFile = url.pathname.split('/').pop() || '';
  if (/teacher\.html?$/i.test(currentFile)) {
    url.pathname = url.pathname.replace(/teacher\.html?$/i, 'index.html');
  } else if (!/index\.html?$/i.test(currentFile)) {
    url.pathname = url.pathname.replace(/[^/]*$/, 'index.html');
  }
  url.search = '?room=' + encodeURIComponent(sessionCode);
  url.hash = '';
  return url.toString();
}

async function createNewSession() {
  const newRoomId = generateRoomId();
  currentSession = newRoomId;
  localStorage.setItem('teacher_session', currentSession);
  currentSessionCodeSpan.textContent = currentSession;

  const studentUrl = buildStudentUrl(currentSession);
  studentLinkSpan.textContent = studentUrl;
  sessionInfoDiv.style.display = 'block';
  generateQRCodeWithSession(currentSession);

  if (isTeaching) await endClass();
  startBtn.disabled = false;
  statusDiv.textContent = '新课程已创建，课程码：' + currentSession;
}

function generateQRCodeWithSession(sessionCode) {
  const studentUrl = buildStudentUrl(sessionCode);
  const qrDesc = document.getElementById('qrDesc');
  const qrContainer = document.getElementById('qrcode');
  const studentUrlTextDiv = document.getElementById('studentUrlText');
  const copyBtn = document.getElementById('copyUrlBtn');

  studentUrlTextDiv.textContent = studentUrl;
  studentUrlTextDiv.style.display = 'block';
  copyBtn.style.display = 'inline-block';
  copyBtn.onclick = function() {
    navigator.clipboard.writeText(studentUrl).then(function() {
      alert('链接已复制');
    }).catch(function() {
      alert('复制失败，请手动复制');
    });
  };

  if (typeof qrcode === 'undefined') {
    qrDesc.textContent = '二维码库加载失败，请手动复制下方链接';
    return;
  }
  try {
    const qr = qrcode(0, 'M');
    qr.addData(studentUrl);
    qr.make();
    const cellSize = 4;
    const margin = 2;
    const size = qr.getModuleCount() * cellSize + margin * 2;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000000';
    for (let row = 0; row < qr.getModuleCount(); row++) {
      for (let col = 0; col < qr.getModuleCount(); col++) {
        if (qr.isDark(row, col)) {
          ctx.fillRect(margin + col * cellSize, margin + row * cellSize, cellSize, cellSize);
        }
      }
    }
    qrContainer.innerHTML = '';
    qrContainer.appendChild(canvas);
    qrDesc.textContent = '手机扫码即可观看字幕';
  } catch (err) {
    console.error('二维码生成失败', err);
    qrDesc.textContent = '二维码生成失败，请使用下方链接';
  }
}

startBtn.addEventListener('click', startClass);
stopBtn.addEventListener('click', endClass);
manualSendBtn.addEventListener('click', sendManualSubtitle);
newSessionBtn.addEventListener('click', createNewSession);
copyStudentLinkBtn.addEventListener('click', function() {
  const link = studentLinkSpan.textContent;
  if (link) {
    navigator.clipboard.writeText(link).then(function() {
      alert('链接已复制');
    }).catch(function() {
      alert('复制失败');
    });
  }
});

if (currentSession) {
  sessionInfoDiv.style.display = 'block';
  currentSessionCodeSpan.textContent = currentSession;
  const defaultLink = buildStudentUrl(currentSession);
  studentLinkSpan.textContent = defaultLink;
  generateQRCodeWithSession(currentSession);
  startBtn.disabled = false;
} else {
  generateQRCodeWithSession('');
}

renderHistory();
</script>
</body>
</html>
