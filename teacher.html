<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>教师端 - 多语言实时语音翻译</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .page { padding: 24px; }
    .container { max-width: 920px; margin: 0 auto; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 22px; padding: 20px; margin-bottom: 20px; }
    .small { font-size: 12px; color: #94a3b8; }
    .title { margin: 0 0 8px; font-size: 30px; }
    .status { font-size: 14px; color: #cbd5e1; margin-top: 14px; white-space: pre-wrap; }

    .control-bar { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 18px; }
    .icon-btn {
      width: 88px; height: 88px; border-radius: 28px; border: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 36px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,.18);
      transition: transform .15s ease, opacity .15s ease;
    }
    .icon-btn:hover { transform: translateY(-1px); }
    .icon-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .play-btn { background: #16a34a; }
    .pause-btn { background: #f59e0b; }
    .stop-btn { background: #ef4444; }
    .new-session-btn { background: #2563eb; color: white; border: none; border-radius: 16px; padding: 14px 18px; font-size: 16px; cursor: pointer; }

    .lang-toggle-btn, .copy-btn, .confirm-btn, .cancel-btn {
      border: none; border-radius: 14px; padding: 10px 14px; cursor: pointer; font-size: 14px;
    }
    .lang-toggle-btn, .copy-btn { background: #334155; color: #fff; }
    .confirm-btn { background: #16a34a; color: #fff; }
    .cancel-btn { background: #475569; color: #fff; }

    .lang-panel {
      margin-top: 14px; border: 1px solid #334155; border-radius: 18px; background: #0f172a; padding: 16px; display: none;
    }
    .lang-panel.open { display: block; }
    .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px 14px; margin-top: 12px; }
    .lang-option {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 14px; background: #111827; border: 1px solid #334155;
    }
    .lang-option input { width: 18px; height: 18px; accent-color: #22c55e; cursor: pointer; }
    .lang-panel-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .lang-summary { margin-top: 12px; color: #cbd5e1; font-size: 14px; }

    .session-info { background: #1e293b; padding: 14px; border-radius: 14px; margin-top: 16px; line-height: 1.7; word-break: break-all; }
    .teacher-text { font-size: 34px; font-weight: 700; line-height: 1.45; background: #0f172a; border-left: 4px solid #3b82f6; padding: 16px; border-radius: 18px; min-height: 88px; margin-top: 12px; }
    .history { max-height: 420px; overflow-y: auto; margin-top: 12px; }
    .history-item { border-top: 1px solid #1f2937; padding: 12px 0; }
    .qr-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .qr-desc { font-size: 14px; color: #94a3b8; text-align: center; }
    .student-url-text { font-size: 12px; word-break: break-all; background: #0f172a; padding: 8px; border-radius: 8px; margin-top: 8px; width: 100%; }

    @media (max-width: 640px) {
      .page { padding: 14px; }
      .icon-btn { width: 76px; height: 76px; font-size: 30px; border-radius: 22px; }
      .teacher-text { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="container">
    <div class="card">
      <h1 class="title">🎤 实时语音翻译教师端</h1>
      <div class="small">程序开发：鄢清华 重庆工商大学</div>

      <div class="control-bar">
        <button id="startBtn" class="icon-btn play-btn" title="开始上课" aria-label="开始上课" disabled>▶</button>
        <button id="pauseBtn" class="icon-btn pause-btn" title="暂停" aria-label="暂停" disabled>⏸</button>
        <button id="stopBtn" class="icon-btn stop-btn" title="结束课程" aria-label="结束课程" disabled>⏹</button>
        <button id="newSessionBtn" class="new-session-btn">新课程</button>
        
      </div>
      <div id="langSummary" class="lang-summary">默认兜底语种：English；学生在线语种将自动覆盖。</div>
      <div id="status" class="status">⚪ 未开始上课</div>

      <div id="sessionInfo" class="session-info" style="display:none;">
        <strong>当前课程码：</strong> <span id="currentSessionCode"></span><br>
        <strong>学生端链接：</strong> <span id="studentLink"></span><br>
        <button id="copyStudentLink" class="copy-btn" style="margin-top:8px;">复制链接</button>
      </div>

      <div class="small" style="margin-top:16px;">教师原语言</div>
      <div id="sourceText" class="teacher-text">等待语音输入...</div>
    </div>

    <div class="card">
      <div class="small">📱 学生端入口</div>
      <div class="qr-container">
        <div id="qrcode" style="width: 160px; height: 160px;"></div>
        <div id="qrDesc" class="qr-desc">正在生成二维码...</div>
        <div id="studentUrlText" class="student-url-text" style="display:none;"></div>
        <button id="copyUrlBtn" class="copy-btn" style="display:none;">复制链接</button>
      </div>
    </div>

    <div class="card">
      <div class="small">历史记录（教师原语言）</div>
      <div id="history" class="history"></div>
    </div>
  </div>
</div>

<script>

let trtc = null;
let isTeaching = false;
let isPaused = false;
let currentSession = localStorage.getItem('teacher_session') || null;
let currentTaskId = null;
let localHistory = [];
let currentSubtitleState = { roundId: 'initial', sourceText: '', translations: {}, ended: true };
let subtitleRoundStore = new Map();
let subtitleSeq = 0;
let teacherUserId = '';
const appliedTargetLanguages = ['en'];
const studentLanguageMap = new Map();
const roundTranslationState = new Map();
const PRE_TRANSLATE_MIN_TEXT = 6;
const PRE_TRANSLATE_MIN_NEW_CHARS = 5;
const PRE_TRANSLATE_INTERVAL_MS = 800;
const PRE_TRANSLATE_LONG_TEXT = 14;
const PRE_TRANSLATE_PUNCTUATION = /[，。！？；：,.!?;:]$/;

const LANGUAGE_OPTIONS = [
  { value: 'en', label: 'English' },
  { value: 'th', label: 'ไทย' },
  { value: 'vi', label: 'Tiếng Việt' },
  { value: 'id', label: 'Bahasa Indonesia' },
  { value: 'ms', label: 'Bahasa Melayu' },
  { value: 'fr', label: 'Français' },
  { value: 'ja', label: '日本語' },
  { value: 'ru', label: 'Русский' },
  { value: 'ko', label: '한국어' },
  { value: 'de', label: 'Deutsch' },
  { value: 'es', label: 'Español' },
  { value: 'pt', label: 'Português' },
  { value: 'zh', label: '中文' },
  { value: 'it', label: 'Italiano' },
  { value: 'ar', label: 'العربية' }
];

const GET_USERSIG_URL = 'https://1311686407-07zu5h43g1.ap-guangzhou.tencentscf.com';
const START_AI_URL = 'https://1311686407-jpi1vwtz9x.ap-guangzhou.tencentscf.com';
const STOP_AI_URL = 'https://1311686407-0hao9da3yt.ap-guangzhou.tencentscf.com';
const TRANSLATE_URL = 'https://1311686407-7ccgq1nhg9.ap-guangzhou.tencentscf.com';
const SDKAPPID = 1600133369;
const SUPPORTED_TRANSLATION_LANGS = LANGUAGE_OPTIONS.map(item => item.value);
const AI_MESSAGE_TYPES = new Set([10000, 10020, 10001, 10030, 10003]);

const sourceTextDiv = document.getElementById('sourceText');
const historyDiv = document.getElementById('history');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const newSessionBtn = document.getElementById('newSessionBtn');
const langSummary = document.getElementById('langSummary');
const statusDiv = document.getElementById('status');
const sessionInfoDiv = document.getElementById('sessionInfo');
const currentSessionCodeSpan = document.getElementById('currentSessionCode');
const studentLinkSpan = document.getElementById('studentLink');
const copyStudentLinkBtn = document.getElementById('copyStudentLink');

function safeStringify(value) {
  try { return JSON.stringify(value); } catch { return String(value); }
}
function escapeHtml(text) {
  return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function getLanguageLabel(lang) {
  return LANGUAGE_OPTIONS.find(item => item.value === lang)?.label || lang;
}
function getActiveStudentLanguages() {
  return Array.from(new Set(Array.from(studentLanguageMap.values()).filter(lang => SUPPORTED_TRANSLATION_LANGS.includes(lang))));
}
function getEffectiveTargetLanguages() {
  const active = getActiveStudentLanguages();
  return active.length ? active : ['en'];
}
function renderLanguageSummary() {
  const activeLabels = getActiveStudentLanguages().map(getLanguageLabel);
  langSummary.textContent = activeLabels.length
    ? '当前在线学生语种：' + activeLabels.join('、') + '；默认兜底语种：English'
    : '默认兜底语种：English；学生在线语种将自动覆盖。';
}
function estimateAddedChars(currentText, lastText) {
  if (!lastText) return currentText.length;
  if (currentText === lastText) return 0;
  if (currentText.startsWith(lastText)) return currentText.length - lastText.length;
  return Math.max(currentText.length - lastText.length, PRE_TRANSLATE_MIN_NEW_CHARS);
}
function getRoundState(roundId) {
  if (!roundTranslationState.has(roundId)) {
    roundTranslationState.set(roundId, {
      lastTranslatedText: '',
      lastTranslateAt: 0,
      finalSent: false,
      inFlight: false,
      pendingText: '',
      pendingFinal: false
    });
  }
  return roundTranslationState.get(roundId);
}
function shouldTriggerPreTranslate(cleanText, state) {
  if (!cleanText || cleanText.length < PRE_TRANSLATE_MIN_TEXT) return false;
  const since = Date.now() - (state.lastTranslateAt || 0);
  const added = estimateAddedChars(cleanText, state.lastTranslatedText || '');
  const hasPunctuation = PRE_TRANSLATE_PUNCTUATION.test(cleanText);
  if (!state.lastTranslatedText && cleanText.length >= PRE_TRANSLATE_LONG_TEXT) return true;
  if (added >= PRE_TRANSLATE_MIN_NEW_CHARS) return true;
  if (hasPunctuation && since >= Math.floor(PRE_TRANSLATE_INTERVAL_MS / 2)) return true;
  if (since >= PRE_TRANSLATE_INTERVAL_MS) return true;
  return false;
}
function mergeTranslationMap(target, candidate) {
  if (!candidate || typeof candidate !== 'object') return target;
  Object.entries(candidate).forEach(([lang, value]) => {
    const key = String(lang || '').trim();
    if (!key) return;
    if (typeof value === 'string' && value.trim()) {
      target[key] = value.trim();
      return;
    }
    if (value && typeof value === 'object') {
      const nested = [value.text, value.translation_text, value.translationText, value.value, value.target_text, value.targetText].find(v => typeof v === 'string' && v.trim());
      if (nested) target[key] = nested.trim();
    }
  });
  return target;
}
function pickFirstNonEmptyString(values) {
  for (const value of values) {
    if (typeof value === 'string' && value.trim()) return value.trim();
  }
  return '';
}
function decodeCustomMessageData(data) {
  if (!data) return null;
  try {
    if (data instanceof ArrayBuffer || ArrayBuffer.isView(data)) {
      const decoded = new TextDecoder().decode(data);
      return decoded ? JSON.parse(decoded) : null;
    }
    if (typeof data === 'string') return JSON.parse(data);
    if (typeof data === 'object') {
      if (typeof data.data === 'string' && data.data.trim()) {
        try { return JSON.parse(data.data); } catch {}
      }
      if (typeof data.data === 'object' && data.data) return data.data;
      return data;
    }
  } catch (e) {
    console.warn('CUSTOM_MESSAGE decode failed', e, data);
  }
  return null;
}
function normalizeSubtitleMessage(msg) {
  const payload = (msg && typeof msg === 'object' && msg.payload && typeof msg.payload === 'object') ? msg.payload : {};
  const typeValue = (msg && msg.type != null) ? Number(msg.type) : NaN;
  const type = Number.isFinite(typeValue) ? typeValue : 0;
  const sourceText = pickFirstNonEmptyString([payload.text, payload.source_text, payload.sourceText, payload.original_text, msg && msg.source_text, msg && msg.text]);
  const translationText = pickFirstNonEmptyString([payload.translation_text, payload.translationText, payload.translated_text, payload.target_text, msg && msg.translation_text]);
  const translationLanguage = pickFirstNonEmptyString([payload.translation_language, payload.translationLanguage, payload.target_language, msg && msg.translation_language]);
  const translations = mergeTranslationMap(mergeTranslationMap({}, payload.translations), msg && msg.translations);
  if (translationText) translations[translationLanguage || 'default'] = translationText;
  const roundId = pickFirstNonEmptyString([payload.roundId, payload.roundid, payload.round_id, msg && msg.roundId, msg && msg.roundid]) || ('type_' + type + '_' + Date.now());
  const end = Boolean(payload.end || payload.isFinal || payload.final || payload.finished);
  const statusMessage = pickFirstNonEmptyString([payload.message, payload.reason, payload.status, payload.metric, msg && msg.message]);
  return { type, roundId, sourceText, translationText, translationLanguage, translations, end, statusMessage, payload, sender: msg && (msg.sender || msg.userId), isSubtitleLike: !!sourceText || !!translationText || Object.keys(translations).length > 0 || type === 10000 || type === 10020 };
}
function mergeSubtitleRound(store, normalized) {
  const key = normalized.roundId || ('fallback_' + Date.now());
  const existing = store.get(key) || { roundId: key, sourceText: '', translations: {}, ended: false };
  if (normalized.sourceText) existing.sourceText = normalized.sourceText;
  mergeTranslationMap(existing.translations, normalized.translations);
  if (normalized.translationLanguage && normalized.translationText) existing.translations[normalized.translationLanguage] = normalized.translationText;
  if (normalized.end) existing.ended = true;
  store.set(key, existing);
  return existing;
}
function renderCurrentTeacherSubtitle() { sourceTextDiv.textContent = currentSubtitleState.sourceText || '等待语音输入...'; }
function pushTeacherHistorySnapshot(snapshot) {
  if (!snapshot || !snapshot.sourceText) return;
  localHistory.unshift({ source: snapshot.sourceText, timestamp: new Date().toLocaleTimeString() });
  if (localHistory.length > 50) localHistory.pop();
  renderHistory();
}
function renderHistory() {
  if (!localHistory.length) { historyDiv.innerHTML = '<div class="small">暂无历史记录</div>'; return; }
  historyDiv.innerHTML = localHistory.map(item => `<div class="history-item"><div>${escapeHtml(item.source)}</div><div class="small">${escapeHtml(item.timestamp)}</div></div>`).join('');
}
function generateRoomId() { return Math.floor(10000 + Math.random() * 90000).toString(); }
async function postJson(url, params) {
  const response = await fetch(url, { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(params) });
  const rawText = await response.text();
  let data = null;
  try { data = rawText ? JSON.parse(rawText) : null; } catch { throw new Error('接口非 JSON 返回: ' + (rawText || ('HTTP ' + response.status))); }
  if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + rawText);
  if (data && data.error) throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));
  return data || {};
}
async function getUserSig(userId, roomId) {
  const data = await postJson(GET_USERSIG_URL, { userId, roomId });
  if (!data.userSig) throw new Error('获取 UserSig 失败');
  return data.userSig;
}
async function startAITranscription(roomId, userId, userSig, targetLanguages) {
  const filteredTargetLanguages = (targetLanguages || []).filter(lang => SUPPORTED_TRANSLATION_LANGS.includes(lang));
  const data = await postJson(START_AI_URL, { roomId, userId, userSig, targetLanguages: filteredTargetLanguages });
  if (!data || !data.taskId) throw new Error('启动转录失败: ' + JSON.stringify(data));
  return data.taskId;
}
async function stopAITranscription(taskId) { await postJson(STOP_AI_URL, { taskId }); }
async function translateSubtitleByFunction(sourceText, isFinal, targetLanguages) {
  const selectedLangs = (targetLanguages || getEffectiveTargetLanguages()).filter(lang => SUPPORTED_TRANSLATION_LANGS.includes(lang));
  if (!sourceText || !sourceText.trim()) return null;
  const payload = { roomId: parseInt(currentSession, 10), speakerId: 'teacher', seq: ++subtitleSeq, sourceLang: 'zh-CN', sourceText: sourceText.trim(), targetLangs: selectedLangs.length ? selectedLangs : ['en'], isFinal: !!isFinal, ts: Date.now() };
  const result = await postJson(TRANSLATE_URL, payload);
  if (!result || !result.ok || !result.data) throw new Error('翻译函数返回异常: ' + JSON.stringify(result));
  return result.data;
}
async function broadcastTranslatedSubtitle(data, roundId) {
  if (!trtc || !data || isPaused) return;
  const message = { cmd: 'translated_subtitle', from: teacherUserId || 'teacher', roundId: String(roundId || data.seq || Date.now()), source_text: data.sourceText || '', translations: data.translations || {}, end: !!data.isFinal, ts: Date.now() };
  const encoded = new TextEncoder().encode(JSON.stringify(message));
  await trtc.sendCustomMessage({ cmdId: 1, data: encoded.buffer, reliable: true, ordered: true });
}
async function runTranslationForRound(roundId, cleanText, isFinal) {
  const state = getRoundState(roundId);
  if (state.inFlight) { state.pendingText = cleanText; state.pendingFinal = state.pendingFinal || !!isFinal; return; }
  state.inFlight = true;
  try {
    const translated = await translateSubtitleByFunction(cleanText, isFinal, getEffectiveTargetLanguages());
    currentSubtitleState = { roundId: String(roundId), sourceText: translated.sourceText || cleanText, translations: translated.translations || {}, ended: !!isFinal };
    renderCurrentTeacherSubtitle();
    if (isFinal) pushTeacherHistorySnapshot(currentSubtitleState);
    await broadcastTranslatedSubtitle(translated, roundId);
    state.lastTranslatedText = cleanText;
    state.lastTranslateAt = Date.now();
    if (isFinal) state.finalSent = true;
  } catch (err) {
    console.error('translate function failed:', err);
    statusDiv.textContent = '翻译函数失败：' + (err && err.message ? err.message : String(err));
  } finally {
    state.inFlight = false;
    if (state.pendingText) {
      const nextText = state.pendingText; const nextFinal = state.pendingFinal;
      state.pendingText = ''; state.pendingFinal = false;
      if (!state.finalSent || nextFinal) await runTranslationForRound(roundId, nextText, nextFinal);
    }
  }
}
function maybeTranslateSubtitle(roundId, sourceText, isFinal) {
  if (isPaused) return;
  const cleanText = (sourceText || '').trim();
  if (!cleanText) return;
  const state = getRoundState(roundId);
  if (state.finalSent && !isFinal) return;
  if (isFinal) {
    if (state.finalSent && state.lastTranslatedText === cleanText) return;
    runTranslationForRound(roundId, cleanText, true); return;
  }
  if (cleanText === state.lastTranslatedText) return;
  if (!shouldTriggerPreTranslate(cleanText, state)) return;
  runTranslationForRound(roundId, cleanText, false);
}
async function startClass() {
  if (isTeaching) return;
  if (!currentSession) { alert('请先创建新课程'); return; }
  const roomId = parseInt(currentSession, 10);
  const userId = 'teacher_' + Date.now();
  teacherUserId = userId;
  try {
    statusDiv.textContent = '正在获取 UserSig...';
    const userSig = await getUserSig(userId, roomId);
    trtc = TRTC.create();
    trtc.on(TRTC.EVENT.CUSTOM_MESSAGE, onCustomMessage);
    if (TRTC.EVENT && TRTC.EVENT.REMOTE_USER_LEAVE) {
      trtc.on(TRTC.EVENT.REMOTE_USER_LEAVE, event => {
        const remoteUserId = event?.userId || event?.data?.userId;
        if (remoteUserId && studentLanguageMap.delete(remoteUserId)) renderLanguageSummary();
      });
    }
    await trtc.enterRoom({ sdkAppId: SDKAPPID, roomId, scene: 'rtc', userId, userSig });
    await trtc.startLocalAudio();
    isTeaching = true; isPaused = false;
    startBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false;
    statusDiv.textContent = '已进入房间，正在启动 AI 转录...';
    try {
      currentTaskId = await startAITranscription(roomId, userId, userSig, ['en']);
      statusDiv.textContent = '▶ 上课中... AI 转录已启动，翻译语种将按在线学生自动调整';
    } catch (aiErr) {
      const message = (aiErr && aiErr.message) || String(aiErr || '');
      if (message.includes('TaskExist') || message.includes('任务已存在')) {
        currentTaskId = 'TASK_EXISTS';
        statusDiv.textContent = '▶ 上课中... 房间里已有 AI 转录任务，当前页面继续复用';
      } else {
        statusDiv.textContent = '已进房间，但 AI 转录启动失败：' + message;
      }
    }
  } catch (err) {
    console.error('startClass failed:', err);
    statusDiv.textContent = '启动失败：' + ((err && err.message) || JSON.stringify(err));
    if (trtc) await trtc.exitRoom().catch(() => {});
    trtc = null; isTeaching = false; isPaused = false; currentTaskId = null; teacherUserId = '';
    startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
  }
}
function pauseClass() {
  if (!isTeaching) return;
  isPaused = !isPaused;
  pauseBtn.textContent = isPaused ? '⏯' : '⏸';
  pauseBtn.title = isPaused ? '继续' : '暂停';
  pauseBtn.setAttribute('aria-label', isPaused ? '继续' : '暂停');
  statusDiv.textContent = isPaused ? '⏸ 已暂停：老师仍在房间中，但暂不广播新的翻译字幕' : '▶ 已继续：正在接收并广播字幕';
}
async function endClass() {
  try {
    if (currentTaskId && currentTaskId !== 'TASK_EXISTS') await stopAITranscription(currentTaskId).catch(err => console.warn('停止AI转录失败', err));
    currentTaskId = null;
    if (trtc) { await trtc.exitRoom().catch(err => console.warn('退出房间失败', err)); trtc = null; }
  } finally {
    isTeaching = false; isPaused = false; teacherUserId = '';
    subtitleRoundStore = new Map(); studentLanguageMap.clear(); roundTranslationState.clear(); renderLanguageSummary();
    startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
    pauseBtn.textContent = '⏸'; pauseBtn.title = '暂停';
    statusDiv.textContent = '⏹ 课程已结束';
  }
}
function onCustomMessage(event) {
  const msg = decodeCustomMessageData(event && event.data); if (!msg) return;
  if (msg.cmd === 'student_lang_update') {
    const lang = typeof msg.lang === 'string' ? msg.lang.trim() : '';
    const userId = event?.userId || msg.from;
    if (userId && SUPPORTED_TRANSLATION_LANGS.includes(lang)) { studentLanguageMap.set(userId, lang); renderLanguageSummary(); }
    return;
  }
  if (msg.cmd === 'translated_subtitle') return;
  if (!AI_MESSAGE_TYPES.has(Number(msg.type))) return;
  const normalized = normalizeSubtitleMessage(msg);
  if (!normalized.isSubtitleLike) {
    if (normalized.type === 10003) statusDiv.textContent = isPaused ? '⏸ 已暂停，AI 会话已就绪' : '▶ 上课中... AI 会话已就绪';
    else if (normalized.type === 10001) statusDiv.textContent = '▶ 上课中... AI 状态：' + (normalized.statusMessage || '已收到');
    else if (normalized.type === 10030) statusDiv.textContent = '⚠ AI 服务错误：' + (normalized.statusMessage || safeStringify(normalized.payload));
    return;
  }
  const merged = mergeSubtitleRound(subtitleRoundStore, normalized);
  currentSubtitleState = merged; renderCurrentTeacherSubtitle();
  if (!isPaused) statusDiv.textContent = '▶ 上课中... 正在接收字幕';
  maybeTranslateSubtitle(merged.roundId, merged.sourceText, merged.ended);
}
function buildStudentUrl(sessionCode) {
  const url = new URL(window.location.href);
  const currentFile = url.pathname.split('/').pop() || '';
  if (/teacher1?(?:_optimized)?\.html?$/i.test(currentFile)) url.pathname = url.pathname.replace(/teacher1?(?:_optimized)?\.html?$/i, 'student.html');
  else if (!/student\.html?$/i.test(currentFile)) url.pathname = url.pathname.replace(/[^/]*$/, 'student.html');
  url.search = '?room=' + encodeURIComponent(sessionCode || '');
  url.hash = '';
  return url.toString();
}
async function createNewSession() {

  currentSessionCodeSpan.textContent = currentSession;
  const studentUrl = buildStudentUrl(currentSession); studentLinkSpan.textContent = studentUrl;
  sessionInfoDiv.style.display = 'block'; generateQRCodeWithSession(currentSession);
  subtitleSeq = 0; currentSubtitleState = { roundId: 'initial', sourceText: '', translations: {}, ended: true };
  subtitleRoundStore = new Map(); studentLanguageMap.clear(); roundTranslationState.clear(); renderLanguageSummary();
  sourceTextDiv.textContent = '等待语音输入...';
  startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
  statusDiv.textContent = '新课程已创建，课程码：' + currentSession + '；等待学生加入后自动采集在线语种';
}
function generateQRCodeWithSession(sessionCode) {
  const studentUrl = buildStudentUrl(sessionCode);
  const qrDesc = document.getElementById('qrDesc'); const qrContainer = document.getElementById('qrcode'); const studentUrlTextDiv = document.getElementById('studentUrlText'); const copyBtn = document.getElementById('copyUrlBtn');
  studentUrlTextDiv.textContent = studentUrl; studentUrlTextDiv.style.display = 'block'; copyBtn.style.display = 'inline-block';
  copyBtn.onclick = function() { navigator.clipboard.writeText(studentUrl).then(() => alert('链接已复制')).catch(() => alert('复制失败，请手动复制')); };
  if (typeof qrcode === 'undefined') { qrDesc.textContent = '二维码库加载受浏览器策略影响，但不影响翻译；请直接复制下方链接给学生。'; return; }
  try {
    const qr = qrcode(0, 'M'); qr.addData(studentUrl); qr.make(); const cellSize = 4; const margin = 2; const size = qr.getModuleCount() * cellSize + margin * 2; const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size; const ctx = canvas.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,size,size); ctx.fillStyle = '#000000';
    for (let row = 0; row < qr.getModuleCount(); row++) for (let col = 0; col < qr.getModuleCount(); col++) if (qr.isDark(row,col)) ctx.fillRect(margin + col*cellSize, margin + row*cellSize, cellSize, cellSize);
    qrContainer.innerHTML = ''; qrContainer.appendChild(canvas); qrDesc.textContent = '手机扫码即可观看字幕';
  } catch (err) { console.error('二维码生成失败', err); qrDesc.textContent = '二维码生成失败，请使用下方链接'; }
}
startBtn.addEventListener('click', startClass);
pauseBtn.addEventListener('click', pauseClass);
stopBtn.addEventListener('click', endClass);
newSessionBtn.addEventListener('click', createNewSession);
copyStudentLinkBtn.addEventListener('click', () => { const link = studentLinkSpan.textContent; if (!link) return; navigator.clipboard.writeText(link).then(() => alert('链接已复制')).catch(() => alert('复制失败')); });
renderLanguageSummary();
renderHistory();
if (currentSession) { sessionInfoDiv.style.display = 'block'; currentSessionCodeSpan.textContent = currentSession; const defaultLink = buildStudentUrl(currentSession); studentLinkSpan.textContent = defaultLink; generateQRCodeWithSession(currentSession); startBtn.disabled = false; }
else { generateQRCodeWithSession(''); }
if (window.location.protocol === 'file:') statusDiv.textContent = '请不要直接双击 HTML。请用 HTTP 服务访问，例如 http://127.0.0.1:5500/teacher.html';
