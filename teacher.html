<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>教师端 - 多语言实时语音翻译</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .page { padding: 24px; }
    .container { max-width: 920px; margin: 0 auto; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 22px; padding: 20px; margin-bottom: 20px; }
    .small { font-size: 12px; color: #94a3b8; }
    .title { margin: 0 0 8px; font-size: 30px; }
    .status { font-size: 14px; color: #cbd5e1; margin-top: 14px; white-space: pre-wrap; }

    .control-bar { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 18px; }
    .icon-btn {
      width: 96px; height: 96px; border-radius: 30px; border: 3px solid rgba(255,255,255,.42); cursor: pointer;
      display: inline-flex; align-items: flex-start; justify-content: center;
      padding-top: 14px; position: relative; overflow: hidden;
      font-size: 36px; color: #fff; font-weight: 900;
      text-shadow: 0 2px 0 rgba(255,255,255,.18), 0 4px 10px rgba(0,0,0,.22);
      box-shadow: inset 0 3px 0 rgba(255,255,255,.34), inset 0 -7px 0 rgba(0,0,0,.24), 0 20px 34px rgba(0,0,0,.34), 0 7px 0 rgba(2,6,23,.72), 0 0 0 4px rgba(255,255,255,.06);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .icon-btn::before {
      content: '';
      position: absolute;
      left: 8px; right: 8px; top: 7px;
      height: 28px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.52), rgba(255,255,255,.08) 55%, rgba(255,255,255,0));
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .icon-btn::after {
      content: attr(data-label);
      position: absolute;
      left: 9px; right: 9px; bottom: 9px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      color: rgba(255,255,255,.98);
      text-shadow: 0 1px 0 rgba(0,0,0,.22);
      border-radius: 999px;
      padding: 3px 0 4px;
      background: rgba(10, 18, 34, .18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }
    .icon-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: inset 0 3px 0 rgba(255,255,255,.38), inset 0 -7px 0 rgba(0,0,0,.20), 0 26px 38px rgba(0,0,0,.38), 0 9px 0 rgba(2,6,23,.76), 0 0 24px rgba(255,255,255,.08);
      filter: saturate(1.08);
    }
    .icon-btn:active {
      transform: translateY(2px) scale(.99);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.22), inset 0 -3px 0 rgba(0,0,0,.24), 0 10px 18px rgba(0,0,0,.28), 0 3px 0 rgba(2,6,23,.56);
    }
    .icon-btn:disabled {
      opacity: 1;
      cursor: not-allowed;
      transform: none;
      background: linear-gradient(180deg, #71839c 0%, #506077 55%, #3c4a60 100%) !important;
      color: #d6deea !important;
      border-color: rgba(221,231,246,.34) !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.14), inset 0 -6px 0 rgba(0,0,0,.18), 0 7px 0 rgba(15,23,42,.52), 0 14px 22px rgba(0,0,0,.22) !important;
      filter: grayscale(.12) saturate(.8);
    }
    .play-btn {
      background: radial-gradient(circle at 50% 18%, rgba(255,255,255,.40), rgba(255,255,255,0) 34%), linear-gradient(180deg, #86efac 0%, #22c55e 34%, #16a34a 68%, #166534 100%);
      border-color: #dcfce7;
    }
    .pause-btn {
      background: radial-gradient(circle at 50% 18%, rgba(255,255,255,.42), rgba(255,255,255,0) 34%), linear-gradient(180deg, #fde68a 0%, #f59e0b 34%, #ea580c 70%, #c2410c 100%);
      border-color: #ffedd5;
      color: #fff7ed;
    }
    .stop-btn {
      background: radial-gradient(circle at 50% 18%, rgba(255,255,255,.40), rgba(255,255,255,0) 34%), linear-gradient(180deg, #fda4af 0%, #fb7185 28%, #ef4444 64%, #b91c1c 100%);
      border-color: #fee2e2;
    }
    .new-session-btn, .login-trigger-btn {
      position: relative; overflow: hidden;
      border-radius: 18px; padding: 13px 18px; font-size: 16px; font-weight: 900; cursor: pointer;
      color: #fff; border: 2px solid rgba(255,255,255,.54);
      text-shadow: 0 1px 0 rgba(255,255,255,.10), 0 3px 8px rgba(0,0,0,.20);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.34), inset 0 -5px 0 rgba(0,0,0,.20), 0 14px 24px rgba(0,0,0,.26), 0 5px 0 rgba(2,6,23,.56), 0 0 0 3px rgba(255,255,255,.05);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .new-session-btn::before, .login-trigger-btn::before {
      content: '';
      position: absolute; left: 10px; right: 10px; top: 7px; height: 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.50), rgba(255,255,255,0));
      pointer-events: none;
    }
    .new-session-btn:hover, .login-trigger-btn:hover { transform: translateY(-2px); filter: saturate(1.08) brightness(1.03); box-shadow: inset 0 2px 0 rgba(255,255,255,.36), inset 0 -5px 0 rgba(0,0,0,.18), 0 20px 30px rgba(0,0,0,.30), 0 7px 0 rgba(2,6,23,.60), 0 0 22px rgba(255,255,255,.08); }
    .new-session-btn:active, .login-trigger-btn:active { transform: translateY(2px); box-shadow: inset 0 1px 0 rgba(255,255,255,.20), inset 0 -3px 0 rgba(0,0,0,.20), 0 8px 16px rgba(0,0,0,.24), 0 3px 0 rgba(2,6,23,.46); }
    .new-session-btn {
      min-width: 132px;
      background: radial-gradient(circle at 50% 16%, rgba(255,255,255,.44), rgba(255,255,255,0) 36%), linear-gradient(180deg, #c4b5fd 0%, #8b5cf6 34%, #7c3aed 68%, #5b21b6 100%);
      border-color: #ede9fe;
    }
    .new-session-btn:disabled {
      background: linear-gradient(180deg, #71839c, #506077) !important; color: #d6deea !important; border-color: rgba(221,231,246,.30) !important; cursor: not-allowed; box-shadow: inset 0 2px 0 rgba(255,255,255,.12), inset 0 -4px 0 rgba(0,0,0,.18), 0 6px 0 rgba(15,23,42,.48), 0 12px 18px rgba(0,0,0,.18) !important;
    }
    .login-trigger-btn {
      min-width: 102px;
      background: radial-gradient(circle at 50% 16%, rgba(255,255,255,.50), rgba(255,255,255,0) 36%), linear-gradient(180deg, #67e8f9 0%, #22d3ee 28%, #2563eb 66%, #1d4ed8 100%);
      border-color: #dbeafe;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.40), inset 0 -5px 0 rgba(0,0,0,.22), 0 16px 28px rgba(37,99,235,.30), 0 6px 0 rgba(2,6,23,.58), 0 0 0 3px rgba(96,165,250,.12);
    }
    .login-trigger-btn.logged-in {
      background: radial-gradient(circle at 50% 16%, rgba(255,255,255,.44), rgba(255,255,255,0) 36%), linear-gradient(180deg, #86efac 0%, #4ade80 32%, #16a34a 68%, #166534 100%);
      border-color: #dcfce7;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.40), inset 0 -5px 0 rgba(0,0,0,.20), 0 16px 28px rgba(34,197,94,.24), 0 6px 0 rgba(2,6,23,.58), 0 0 0 3px rgba(74,222,128,.10);
    }
    .locked-btn {
      opacity: 1 !important;
      cursor: not-allowed !important;
      background: linear-gradient(180deg, #71839c, #506077) !important;
      color: #d6deea !important;
      border-color: rgba(221,231,246,.30) !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.12), inset 0 -4px 0 rgba(0,0,0,.18), 0 6px 0 rgba(15,23,42,.48), 0 12px 18px rgba(0,0,0,.18) !important;
      filter: grayscale(.12) saturate(.8);
    }
    .auth-badge {
      display: inline-flex; align-items: center; gap: 6px; margin-left: 10px; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 900;
      background: linear-gradient(180deg, #7f1d1d, #4c0519); color: #ffe4e6; border: 1px solid #ef4444;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 8px 18px rgba(127,29,29,.24);
    }
    .auth-badge.ok {
      background: linear-gradient(180deg, #166534, #14532d); color: #dcfce7; border-color: #4ade80;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 8px 18px rgba(22,163,74,.22);
    }
    .auth-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, .72); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 1000; }
    .auth-overlay.open { display: flex; }
    .auth-modal { width: min(420px, 100%); background: #111827; border: 1px solid #334155; border-radius: 22px; padding: 20px; box-shadow: 0 18px 48px rgba(0,0,0,.38); }
    .auth-title { margin: 0 0 8px; font-size: 22px; }
    .auth-desc { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 14px; }
    .auth-input { width: 100%; background: #0f172a; color: #fff; border: 1px solid #475569; border-radius: 14px; padding: 12px 14px; font-size: 16px; outline: none; }
    .auth-error { min-height: 22px; margin-top: 10px; color: #fca5a5; font-size: 13px; }
    .auth-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

    .lang-toggle-btn, .copy-btn, .confirm-btn, .cancel-btn {
      border: none; border-radius: 14px; padding: 10px 14px; cursor: pointer; font-size: 14px;
    }
    .lang-toggle-btn, .copy-btn { background: #334155; color: #fff; }
    .confirm-btn { background: #16a34a; color: #fff; }
    .cancel-btn { background: #475569; color: #fff; }

    .lang-panel {
      margin-top: 14px; border: 1px solid #334155; border-radius: 18px; background: #0f172a; padding: 16px; display: none;
    }
    .lang-panel.open { display: block; }
    .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px 14px; margin-top: 12px; }
    .lang-option {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 14px; background: #111827; border: 1px solid #334155;
    }
    .lang-option input { width: 18px; height: 18px; accent-color: #22c55e; cursor: pointer; }
    .lang-panel-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .lang-summary { margin-top: 12px; color: #cbd5e1; font-size: 14px; }

    .session-info { background: #1e293b; padding: 14px; border-radius: 14px; margin-top: 16px; line-height: 1.7; word-break: break-all; }
    .teacher-text { font-size: 34px; font-weight: 700; line-height: 1.45; background: #0f172a; border-left: 4px solid #3b82f6; padding: 16px; border-radius: 18px; min-height: 88px; margin-top: 12px; }
    .history { max-height: 420px; overflow-y: auto; margin-top: 12px; }
    .history-item { border-top: 1px solid #1f2937; padding: 12px 0; }
    .qr-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .qr-desc { font-size: 14px; color: #94a3b8; text-align: center; }
    .student-url-text { font-size: 12px; word-break: break-all; background: #0f172a; padding: 8px; border-radius: 8px; margin-top: 8px; width: 100%; }

    @media (max-width: 640px) {
      .page { padding: 14px; }
      .icon-btn { width: 82px; height: 82px; font-size: 29px; border-radius: 24px; padding-top: 11px; }
      .icon-btn::after { left: 7px; right: 7px; bottom: 7px; font-size: 11px; }
      .teacher-text { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="container">
    <div class="card">
      <h1 class="title">🎤 实时语音翻译教师端</h1>
      <div class="small">程序开发：鄢清华 重庆工商大学</div>

      <div class="control-bar">
        <button id="startBtn" class="icon-btn play-btn" title="开始上课" aria-label="开始上课" data-label="开始" disabled>▶</button>
        <button id="pauseBtn" class="icon-btn pause-btn" title="暂停" aria-label="暂停" data-label="暂停" disabled>⏸</button>
        <button id="stopBtn" class="icon-btn stop-btn" title="结束课程" aria-label="结束课程" data-label="结束" disabled>⏹</button>
        <button id="loginTriggerBtn" class="login-trigger-btn" title="教师登录" aria-label="教师登录">登录</button>
        <button id="newSessionBtn" class="new-session-btn">新课程</button>
        <span id="authBadge" class="auth-badge">未登录</span>
      </div>
      <div id="langSummary" class="lang-summary">English。</div>
      <div id="status" class="status">⚪ 未开始上课</div>

      <div id="sessionInfo" class="session-info" style="display:none;">
        <strong>当前课程码：</strong> <span id="currentSessionCode"></span><br>
        <strong>学生端链接：</strong> <span id="studentLink"></span><br>
        <button id="copyStudentLink" class="copy-btn" style="margin-top:8px;">复制链接</button>
      </div>

      <div class="small" style="margin-top:16px;">教师原语言</div>
      <div id="sourceText" class="teacher-text">等待语音输入...</div>
    </div>

    <div class="card">
      <div class="small">📱 学生端入口</div>
      <div class="qr-container">
        <div id="qrcode" style="width: 160px; height: 160px;"></div>
        <div id="qrDesc" class="qr-desc">正在生成二维码...</div>
        <div id="studentUrlText" class="student-url-text" style="display:none;"></div>
        <button id="copyUrlBtn" class="copy-btn" style="display:none;">复制链接</button>
      </div>
    </div>

    <div class="card">
      <div class="small">历史记录（教师原语言）</div>
      <div id="history" class="history"></div>
    </div>
  </div>
</div>


<div id="authOverlay" class="auth-overlay" aria-hidden="true">
  <div class="auth-modal">
    <h2 class="auth-title">教师登录</h2>
    <div class="auth-desc">请输入邀请码。系统将通过云函数进行校验，验证通过后立即返回主页面并解除教师端操作限制。</div>
    <input id="authInput" class="auth-input" type="password" inputmode="numeric" placeholder="请输入邀请码">
    <div id="authError" class="auth-error"></div>
    <div class="auth-actions">
      <button id="authConfirmBtn" class="confirm-btn">确认</button>
      <button id="authCancelBtn" class="cancel-btn">取消</button>
    </div>
  </div>
</div>

<script>
const GET_ASR_AUTH_URL = 'https://1311686407-0zanrhkwaj.ap-guangzhou.tencentscf.com';
const CLASSROOM_SUBMIT_URL = 'https://1311686407-2ff4v8e2pd.ap-guangzhou.tencentscf.com';
const CLASSROOM_STATE_URL = 'https://1311686407-fezy8495qt.ap-guangzhou.tencentscf.com';
const TRANSLATE_URL = 'https://1311686407-7ccgq1nhg9.ap-guangzhou.tencentscf.com';
const AUTH_STORAGE_KEY = 'teacher_invite_authed';
const AUTH_CODE_STORAGE_KEY = 'teacher_invite_code';
const SUPPORTED_TRANSLATION_LANGS = ['en','th','vi','id','ms','fr','ja','ru','ko','de','es','pt','zh','it','ar'];
const LANGUAGE_OPTIONS = [
  { value: 'en', label: 'English' },
  { value: 'th', label: 'ไทย' },
  { value: 'vi', label: 'Tiếng Việt' },
  { value: 'id', label: 'Bahasa Indonesia' },
  { value: 'ms', label: 'Bahasa Melayu' },
  { value: 'fr', label: 'Français' },
  { value: 'ja', label: '日本語' },
  { value: 'ru', label: 'Русский' },
  { value: 'ko', label: '한국어' },
  { value: 'de', label: 'Deutsch' },
  { value: 'es', label: 'Español' },
  { value: 'pt', label: 'Português' },
  { value: 'zh', label: '中文' },
  { value: 'it', label: 'Italiano' },
  { value: 'ar', label: 'العربية' }
];
const PRE_TRANSLATE_MIN_NEW_CHARS = 5;

let isTeaching = false;
let isPaused = false;
let currentSession = localStorage.getItem('teacher_session') || null;
let localHistory = [];
let subtitleSeq = 0;
let teacherCode = sessionStorage.getItem(AUTH_CODE_STORAGE_KEY) || '';
let asrSocket = null;
let mediaStream = null;
let audioContext = null;
let processorNode = null;
let mediaSourceNode = null;
let pendingPcmBytes = new Uint8Array(0);
let lastPartialText = '';
let currentAsrRoundId = '';
let silenceTimer = null;
let roundTranslationState = new Map();
let requestedStudentLangs = new Set();
let statePollTimer = null;
let lastStateSignature = '';

const sourceTextDiv = document.getElementById('sourceText');
const historyDiv = document.getElementById('history');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const newSessionBtn = document.getElementById('newSessionBtn');
const langSummary = document.getElementById('langSummary');
const statusDiv = document.getElementById('status');
const sessionInfoDiv = document.getElementById('sessionInfo');
const currentSessionCodeSpan = document.getElementById('currentSessionCode');
const studentLinkSpan = document.getElementById('studentLink');
const copyStudentLinkBtn = document.getElementById('copyStudentLink');
const loginTriggerBtn = document.getElementById('loginTriggerBtn');
const authBadge = document.getElementById('authBadge');
const authOverlay = document.getElementById('authOverlay');
const authInput = document.getElementById('authInput');
const authError = document.getElementById('authError');
const authConfirmBtn = document.getElementById('authConfirmBtn');
const authCancelBtn = document.getElementById('authCancelBtn');


function normalizeErrorMessage(err) {
  if (!err) return '未知错误';
  if (err instanceof Error) return err.message || String(err);
  if (typeof err === 'string') return err;
  if (typeof err === 'object') {
    try {
      if (err.message) return String(err.message);
      return JSON.stringify(err);
    } catch {
      return String(err);
    }
  }
  return String(err);
}
function safeAsync(fn) {
  return function(...args) {
    Promise.resolve(fn.apply(this, args)).catch(err => {
      const msg = normalizeErrorMessage(err);
      console.error('Unhandled async handler error:', err);
      statusDiv.textContent = '操作失败：' + msg;
      if (authError && authOverlay.classList.contains('open')) {
        authError.textContent = '操作失败：' + msg;
      }
    });
  };
}
window.addEventListener('unhandledrejection', event => {
  const msg = normalizeErrorMessage(event.reason);
  console.error('Unhandled promise rejection:', event.reason);
  statusDiv.textContent = '运行异常：' + msg;
  event.preventDefault();
});
function escapeHtml(text) {
  return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function getLanguageLabel(lang) {
  return LANGUAGE_OPTIONS.find(item => item.value === lang)?.label || lang;
}
function getEffectiveTargetLanguages() {
  const langs = Array.from(requestedStudentLangs).filter(lang => SUPPORTED_TRANSLATION_LANGS.includes(lang));
  return langs.length ? langs : ['en'];
}
function getRoundState(roundId) {
  if (!roundTranslationState.has(roundId)) {
    roundTranslationState.set(roundId, {
      lastTranslatedText: '',
      finalSent: false,
      inFlight: false,
      pendingSegment: null,
      committedText: '',
      segmentSeq: 0
    });
  }
  return roundTranslationState.get(roundId);
}

let isTeacherAuthed = sessionStorage.getItem(AUTH_STORAGE_KEY) === '1';

function setButtonLockState(button, locked) {
  if (!button) return;
  if (locked) {
    button.classList.add('locked-btn');
    button.dataset.locked = '1';
  } else {
    button.classList.remove('locked-btn');
    delete button.dataset.locked;
  }
}
function updateAuthUI() {
  const locked = !isTeacherAuthed;
  authBadge.textContent = locked ? '未登录' : '已登录';
  authBadge.classList.toggle('ok', !locked);
  loginTriggerBtn.classList.toggle('logged-in', !locked);
  loginTriggerBtn.textContent = locked ? '登录' : '已登录';
  setButtonLockState(startBtn, locked || !currentSession || isTeaching);
  setButtonLockState(pauseBtn, locked || !isTeaching);
  setButtonLockState(stopBtn, locked || !isTeaching);
  setButtonLockState(newSessionBtn, locked);
  startBtn.disabled = locked || !currentSession || isTeaching;
  pauseBtn.disabled = locked || !isTeaching;
  stopBtn.disabled = locked || !isTeaching;
  newSessionBtn.disabled = locked;
}
function requireAuth(event) {
  if (isTeacherAuthed) return false;
  if (event) { event.preventDefault(); event.stopPropagation(); }
  statusDiv.textContent = '请先登录教师端，再进行操作';
  openAuthModal();
  return true;
}
function openAuthModal() {
  authOverlay.classList.add('open');
  authOverlay.setAttribute('aria-hidden', 'false');
  authError.textContent = '';
  authInput.value = '';
  setTimeout(() => authInput.focus(), 0);
}
function closeAuthModal() {
  authOverlay.classList.remove('open');
  authOverlay.setAttribute('aria-hidden', 'true');
}
async function verifyTeacherInvite() {
  const input = String(authInput.value || '').trim();
  if (!input) { authError.textContent = '请输入邀请码'; return; }
  authError.textContent = '正在验证...';
  authConfirmBtn.disabled = true;
  try {
    const probeRoomId = currentSession || '100000';
    await postJson(GET_ASR_AUTH_URL, { roomId: String(probeRoomId), teacherCode: input });
    isTeacherAuthed = true;
    teacherCode = input;
    sessionStorage.setItem(AUTH_STORAGE_KEY, '1');
    sessionStorage.setItem(AUTH_CODE_STORAGE_KEY, input);
    closeAuthModal();
    updateAuthUI();
    statusDiv.textContent = '教师端登录成功';
    return;
  } catch (err) {
    const msg = normalizeErrorMessage(err || '验证失败');
    authError.textContent = /403|邀请码|无效/.test(msg) ? '邀请码错误，请重新输入' : ('验证失败：' + msg);
  } finally {
    authConfirmBtn.disabled = false;
  }
}

function renderLanguageSummary() {
  const activeLabels = getEffectiveTargetLanguages().map(getLanguageLabel);
  const hasStudentReq = Array.from(requestedStudentLangs).length > 0;

function estimateAddedChars(currentText, lastText) {

function extractSegmentForBroadcast(cleanText, state, isFinal) {

async function postJson(url, params) {

}
async function getAsrAuth(roomId) {

async function translateSubtitleByFunction(sourceText, isFinal, targetLanguages) {

  if (!sourceText || !sourceText.trim()) return null;

async function submitSubtitleState(data) {

    roomId: String(currentSession),

async function runTranslationForRound(roundId, segmentInfo) {
  console.log('RUN_TRANSLATION_FOR_ROUND', { roundId, segmentInfo, langs: getEffectiveTargetLanguages() });

  if (!segmentInfo || !segmentInfo.segmentText) return;
  if (state.inFlight) { state.pendingSegment = segmentInfo; return; }
  state.inFlight = true;
  try {
    const translated = await translateSubtitleByFunction(segmentInfo.segmentText, true, getEffectiveTargetLanguages());
    await submitSubtitleState(translated);
    pushTeacherHistorySnapshot({ sourceText: translated.sourceText || segmentInfo.segmentText });
    state.committedText = (state.committedText || '') + (segmentInfo.rawSegment || segmentInfo.segmentText);
    state.lastTranslatedText = segmentInfo.segmentText;
    if (segmentInfo.finalChunk) state.finalSent = true;

  } catch (err) {
    console.error('translate/submit failed:', err);
    statusDiv.textContent = '翻译或提交失败：' + (err && err.message ? err.message : String(err));

    state.inFlight = false;

}
function maybeTranslateSubtitle(roundId, sourceText, isFinal) {
  console.log('MAYBE_TRANSLATE', { roundId, sourceText, isFinal, isPaused, langs: getEffectiveTargetLanguages() });
  if (isPaused) return;
  const cleanText = (sourceText || '').trim();

  const state = getRoundState(roundId);
  if (state.finalSent && !isFinal) return;
  const segmentInfo = extractSegmentForBroadcast(cleanText, state, isFinal);
  console.log('SEGMENT_INFO', segmentInfo);

  if (segmentInfo.segmentText === state.lastTranslatedText && !segmentInfo.finalChunk) return;

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    if (lastPartialText && currentAsrRoundId) {
      maybeTranslateSubtitle(currentAsrRoundId, lastPartialText, true);

function concatUint8(a, b) {
  const out = new Uint8Array(a.length + b.length);
  out.set(a, 0);
  out.set(b, a.length);

async function setupAudioAndStream() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
  } catch (err) {
    if (err && err.name === 'NotFoundError') {

    }

    if (!isTeaching || !asrSocket || asrSocket.readyState !== WebSocket.OPEN) return;
    const input = event.inputBuffer.getChannelData(0);
    const pcmBytes = floatTo16BitPCM(input);
    pendingPcmBytes = concatUint8(pendingPcmBytes, pcmBytes);
    const chunkSize = 1280;
    while (pendingPcmBytes.length >= chunkSize) {
      const chunk = pendingPcmBytes.slice(0, chunkSize);

async function connectAsrWebSocket(roomId) {

function handleAsrMessage(raw) {

async function startClass() {
  if (isTeaching) return;
  if (!isTeacherAuthed) { requireAuth(); return; }

  } catch (err) {

async function cleanupAudio() {
  clearTimeout(silenceTimer);
  silenceTimer = null;
  if (processorNode) { try { processorNode.disconnect(); } catch {} processorNode.onaudioprocess = null; processorNode = null; }
  if (mediaSourceNode) { try { mediaSourceNode.disconnect(); } catch {} mediaSourceNode = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(track => { try { track.stop(); } catch {} }); mediaStream = null; }

async function closeAsrSocket() {

function buildStudentUrl(sessionCode) {

  const basePath = pathname.replace(/\/teacher\.html?$/i, '/');
  url.pathname = basePath.endsWith('/') ? basePath : (basePath + '/');
  url.search = '';
