<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>课堂字幕 - 学生端 (TRTC)</title>
  <script src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .fullscreen-mode { padding: 20px 16px 88px; transition: all 0.2s; }
    .fullscreen-mode .wrap { max-width: 900px; margin: 0 auto; }
    .fullscreen-mode .status { font-size: 13px; color: #94a3b8; margin-bottom: 10px; white-space: pre-wrap; }
    .fullscreen-mode .card { background: #111827; border: 1px solid #334155; border-radius: 18px; padding: 18px; }
    .fullscreen-mode .source { font-weight: 700; margin-bottom: 14px; word-break: break-word; min-height: 56px; }
    .fullscreen-mode .native { color: #cbd5e1; word-break: break-word; min-height: 44px; }
    .fullscreen-mode .toolbar { position: fixed; left: 0; right: 0; bottom: 0; background: #0b1220; border-top: 1px solid #334155; padding: 12px 14px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; z-index: 100; }
    .fullscreen-mode select, .fullscreen-mode button { border-radius: 40px; border: 1px solid #334155; background: #111827; color: #fff; padding: 12px 20px; font-size: 16px; cursor: pointer; }
    .fullscreen-mode .history { margin-top: 16px; }
    .fullscreen-mode .item { border-top: 1px solid #1f2937; padding: 12px 0; }
    .fullscreen-mode .small { font-size: 13px; color: #94a3b8; }
    .font-default .source { font-size: 30px; }
    .font-default .native { font-size: 24px; }
    .font-medium .source { font-size: 40px; }
    .font-medium .native { font-size: 32px; }
    .font-large .source { font-size: 50px; }
    .font-large .native { font-size: 40px; }
    .focus-mode { padding: 0 !important; background: #0f172a; }
    .focus-mode .wrap { max-width: 100% !important; margin: 0 !important; height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .focus-mode .card { width: 100%; background: transparent; border: none; padding: 20px; text-align: center; }
    .focus-mode .source { font-size: 80px !important; margin-bottom: 30px; }
    .focus-mode .native { font-size: 64px !important; }
    .focus-mode .status, .focus-mode .history, .focus-mode .toolbar, .focus-mode .review-panel { display: none !important; }
    .focus-mode .exit-focus { position: fixed; top: 20px; right: 20px; background: #334155; border: none; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; z-index: 1000; }
    .review-panel { margin-top: 24px; border: 1px solid #334155; border-radius: 18px; background: #111827; overflow: hidden; }
    .review-header { background: #1e293b; padding: 12px 18px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .review-header:hover { background: #334155; }
    .review-content { padding: 18px; border-top: 1px solid #334155; display: none; }
    .review-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .review-buttons button { background: #1e293b; border: 1px solid #475569; padding: 10px 18px; border-radius: 28px; font-size: 14px; cursor: pointer; }
    .review-buttons button.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    .preview-area { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin: 12px 0; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.5; }
    .preview-area h4 { margin-top: 0; margin-bottom: 12px; color: #94a3b8; font-size: 14px; }
    @media (max-width: 799px), (max-height: 599px) { .review-panel { display: none; } }
  </style>
</head>
<body>
<div id="fullscreenContainer" class="fullscreen-mode font-default">
  <button id="exitFocusBtn" class="exit-focus" style="display:none;">退出全屏 Exit</button>
  <div class="wrap">
    <div id="sessionInputArea" class="session-input-container" style="background:#111827; border:1px solid #334155; border-radius:18px; padding:18px; margin-bottom:20px; text-align:center;">
      <div>请输入教师提供的课程码 / Enter session code</div>
      <input type="text" id="roomCodeInput" placeholder="例如: 12345" maxlength="5" style="background:#0f172a; border:1px solid #475569; color:white; padding:10px 15px; border-radius:40px; font-size:16px; width:200px; margin:10px;">
      <button id="confirmSessionBtn" style="background:#3b82f6; border:none; color:white; padding:12px 20px; border-radius:40px; cursor:pointer; font-size:16px;">连接课程 Connect</button>
    </div>
    <div id="mainContent" style="display: none;">
      <div id="status" class="status">正在连接教师端… / Connecting...</div>
      <div class="card">
        <div id="source" class="source">等待字幕… / Waiting for subtitles...</div>
        <div id="native" class="native"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="review-header" id="reviewHeader">
          <span>📘 课堂复盘 Class Review</span>
          <span id="reviewToggleText">▼ 点击展开/折叠 Click to expand</span>
        </div>
        <div class="review-content" id="reviewContent">
          <div class="review-buttons">
            <button id="modeTeacher" class="active">老师语言 Teacher</button>
            <button id="modeStudent">我的语言 My Language</button>
            <button id="modeDual">双语 Bilingual</button>
            <button id="generateBtn">✨ 一键生成 Generate</button>
            <button id="downloadBtn" disabled>📥 下载 Download</button>
          </div>
          <div id="previewArea" class="preview-area">
            <h4>复盘预览 Preview</h4>
            <div id="previewContent">暂无内容，点击“一键生成”获取复盘。 / Click Generate</div>
          </div>
        </div>
      </div>
      <div class="history" id="history"></div>
    </div>
  </div>
  <div class="toolbar" id="toolbar">
    <select id="lang">
      <option value="en">English</option>
      <option value="th">ไทย</option>
      <option value="lo">ພາສາລາວ</option>
      <option value="vi">Tiếng Việt</option>
      <option value="id">Bahasa Indonesia</option>
      <option value="ms">Bahasa Melayu</option>
      <option value="fr">Français</option>
      <option value="ja">日本語</option>
      <option value="ru">Русский</option>
      <option value="ko">한국어</option>
      <option value="ur">اردو</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="zh">中文 (简体)</option>
    </select>
    <button id="btnDefault">默认 Default</button>
    <button id="btnMedium">中等 Medium</button>
    <button id="btnLarge">大字体 Large</button>
    <button id="btnFocus">全屏 Fullscreen</button>
    <button id="minimizeBtn">🔽 缩小为悬浮窗 Minimize</button>
    <button id="openWindowBtn">🪟 新窗口悬浮窗 New Window</button>
    <button id="copyLinkBtn">复制当前链接 Copy Link</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  let roomId = params.get('room');
  let isConnected = false;
  let trtc = null;
  let currentSubtitle = { source_text: '', translations: {}, ended: true, roundId: '' };
  let historyList = [];
  let targetLang = localStorage.getItem('student_lang') || 'en';
  let reviewMode = 'teacher';
  let reviewText = '';

  const sessionInputArea = document.getElementById('sessionInputArea');
  const mainContent = document.getElementById('mainContent');
  const roomCodeInput = document.getElementById('roomCodeInput');
  const confirmSessionBtn = document.getElementById('confirmSessionBtn');
  const statusDiv = document.getElementById('status');
  const sourceDiv = document.getElementById('source');
  const nativeDiv = document.getElementById('native');
  const langSelect = document.getElementById('lang');
  const historyDiv = document.getElementById('history');
  const fullscreenContainer = document.getElementById('fullscreenContainer');
  const btnDefault = document.getElementById('btnDefault');
  const btnMedium = document.getElementById('btnMedium');
  const btnLarge = document.getElementById('btnLarge');
  const btnFocus = document.getElementById('btnFocus');
  const exitFocusBtn = document.getElementById('exitFocusBtn');
  const reviewHeader = document.getElementById('reviewHeader');
  const reviewContent = document.getElementById('reviewContent');
  const reviewToggleText = document.getElementById('reviewToggleText');
  const modeTeacher = document.getElementById('modeTeacher');
  const modeStudent = document.getElementById('modeStudent');
  const modeDual = document.getElementById('modeDual');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const previewContent = document.getElementById('previewContent');
  const minimizeBtn = document.getElementById('minimizeBtn');
  const openWindowBtn = document.getElementById('openWindowBtn');
  const copyLinkBtn = document.getElementById('copyLinkBtn');

  const GET_USERSIG_URL = 'https://1311686407-07zu5h43g1.ap-guangzhou.tencentscf.com';
  const SDKAPPID = 1600133369;


  function maybeParseJson(value) {
    if (typeof value !== 'string') return value;
    const trimmed = value.trim();
    if (!trimmed) return value;
    const maybeJson = (trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'));
    if (!maybeJson) return value;
    try {
      return JSON.parse(trimmed);
    } catch (e) {
      return value;
    }
  }

  function decodeCustomMessageData(data) {
    if (!data) return null;
    try {
      if (data instanceof ArrayBuffer) {
        const decoded = new TextDecoder().decode(data);
        return maybeParseJson(decoded);
      }
      if (ArrayBuffer.isView(data)) {
        const decoded = new TextDecoder().decode(data);
        return maybeParseJson(decoded);
      }
      if (typeof data === 'string') {
        return maybeParseJson(data);
      }
      return data;
    } catch (e) {
      console.warn('STUDENT CUSTOM_MESSAGE decode failed', e, data);
      return null;
    }
  }

  function normalizeAiSubtitleMessage(raw) {
    let msg = raw;
    for (let depth = 0; depth < 3; depth++) {
      msg = maybeParseJson(msg);
      if (!msg || typeof msg !== 'object') break;

      if (typeof msg.payload === 'string') {
        msg.payload = maybeParseJson(msg.payload);
      }
      for (const key of ['data', 'message', 'result', 'content', 'body']) {
        if (typeof msg[key] === 'string') {
          msg[key] = maybeParseJson(msg[key]);
        }
        if (msg[key] && typeof msg[key] === 'object' && typeof msg[key].payload === 'string') {
          msg[key].payload = maybeParseJson(msg[key].payload);
        }
      }

      const candidates = [msg, msg.data, msg.message, msg.result, msg.content, msg.body].filter(Boolean);
      for (const candidate of candidates) {
        const payload = candidate && typeof candidate.payload === 'object' ? candidate.payload : {};
        const sourceText = candidate.source_text || candidate.sourceText || candidate.text || payload.text || payload.source_text || payload.sourceText || '';
        const translationText = candidate.translation_text || candidate.translationText || candidate.translation || payload.translation_text || payload.translationText || payload.translation || '';
        const translationLanguage = candidate.translation_language || candidate.translationLanguage || candidate.lang || payload.translation_language || payload.translationLanguage || payload.lang || '';
        const translations = candidate.translations || payload.translations || {};
        const hasTranslations = translations && typeof translations === 'object' && Object.keys(translations).length > 0;
        if (sourceText || translationText || hasTranslations) {
          return {
            sourceText: String(sourceText || ''),
            translationText: String(translationText || ''),
            translationLanguage: String(translationLanguage || ''),
            translations: hasTranslations ? Object.assign({}, translations) : {},
            end: !!(payload.end ?? candidate.end),
            roundId: String(payload.roundid || payload.roundId || candidate.roundid || candidate.roundId || ''),
            raw: candidate
          };
        }
      }

      if (msg.data && typeof msg.data === 'object' && !Array.isArray(msg.data)) {
        msg = msg.data;
        continue;
      }
      break;
    }

    return {
      sourceText: '',
      translationText: '',
      translationLanguage: '',
      translations: {},
      end: false,
      roundId: '',
      raw: raw
    };
  }

  function renderCurrentSubtitle() {
    sourceDiv.textContent = currentSubtitle.source_text || '等待字幕… / Waiting for subtitles...';
    nativeDiv.textContent = getPreferredTranslation(currentSubtitle.translations) || '';
  }

  function pushHistorySnapshot() {
    const source = (currentSubtitle.source_text || '').trim();
    if (!source) return;
    const translation = getPreferredTranslation(currentSubtitle.translations) || '';
    const previous = historyList[0];
    if (previous && previous.source === source) {
      previous.translation = translation;
      previous.translations = Object.assign({}, currentSubtitle.translations);
      previous.timestamp = new Date().toLocaleTimeString();
    } else {
      historyList.unshift({
        source,
        translation,
        timestamp: new Date().toLocaleTimeString(),
        translations: Object.assign({}, currentSubtitle.translations)
      });
      if (historyList.length > 50) historyList.pop();
    }
    renderHistory();
  }

  function escapeHtml(str) {
    return String(str ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  async function postJson(url, params) {
    let response;
    try {
      response = await fetch(url, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(params)
      });
    } catch (networkErr) {
      throw new Error(`网络请求失败：${networkErr?.message || networkErr}`);
    }

    const rawText = await response.text().catch(() => '');
    let data = null;
    try {
      data = rawText ? JSON.parse(rawText) : null;
    } catch (e) {
      throw new Error(`接口返回非 JSON（${response.status}）：${rawText || 'empty response'}`);
    }

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${rawText || JSON.stringify(data)}`);
    }
    if (data && data.error) {
      throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));
    }
    return data || {};
  }

  async function getUserSig(userId, roomId) {
    const data = await postJson(GET_USERSIG_URL, { userId, roomId });
    if (!data.userSig) throw new Error('获取 UserSig 失败');
    return data.userSig;
  }

  function getPreferredTranslation(translations) {
    const map = translations || {};
    return map[targetLang] || Object.values(map)[0] || '';
  }

  function renderHistory() {
    if (historyList.length === 0) {
      historyDiv.innerHTML = '<div class="small">暂无历史记录</div>';
      return;
    }
    historyDiv.innerHTML = historyList.map(item => {
      const translated = item.translations?.[targetLang] || Object.values(item.translations || {})[0] || item.translation || '';
      return `
        <div class="item">
          <div>${escapeHtml(item.source)}</div>
          <div class="small">${escapeHtml(translated || '（暂无翻译）')}</div>
          <div class="small">${escapeHtml(item.timestamp)}</div>
        </div>
      `;
    }).join('');
  }

  async function startConnection(room) {
    const userId = `student_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    try {
      statusDiv.textContent = '正在获取用户签名...';
      const userSig = await getUserSig(userId, room);
      trtc = TRTC.create();
      trtc.on(TRTC.EVENT.CUSTOM_MESSAGE, onCustomMessage);
      await trtc.enterRoom({
        sdkAppId: SDKAPPID,
        roomId: parseInt(room, 10),
        scene: 'rtc',
        userId,
        userSig,
      });
      isConnected = true;
      statusDiv.textContent = '已连接课堂 / Connected';
    } catch (err) {
      console.error('student connect failed:', err);
      statusDiv.textContent = '连接失败：' + (err?.message || String(err));
    }
  }

  function onCustomMessage(event) {
    const decoded = decodeCustomMessageData(event.data);
    console.log('STUDENT CUSTOM_MESSAGE decoded:', decoded);
    console.log('STUDENT CUSTOM_MESSAGE decoded json:', JSON.stringify(decoded));
    if (!decoded) return;

    const normalized = normalizeAiSubtitleMessage(decoded);
    console.log('STUDENT CUSTOM_MESSAGE normalized:', normalized);

    if (!normalized.sourceText && !normalized.translationText && !Object.keys(normalized.translations || {}).length) {
      console.warn('STUDENT CUSTOM_MESSAGE schema not matched:', JSON.stringify(decoded));
      statusDiv.textContent = '已连接课堂 / AI message received but schema not matched';
      return;
    }

    if (normalized.roundId && currentSubtitle.roundId && normalized.roundId !== currentSubtitle.roundId && !normalized.sourceText) {
      currentSubtitle.translations = {};
    }
    if (normalized.roundId) {
      currentSubtitle.roundId = normalized.roundId;
    }

    if (normalized.sourceText) {
      if (currentSubtitle.ended && normalized.sourceText !== currentSubtitle.source_text) {
        currentSubtitle.translations = {};
      }
      currentSubtitle.source_text = normalized.sourceText;
    }

    if (normalized.translationText) {
      currentSubtitle.translations[normalized.translationLanguage || 'default'] = normalized.translationText;
    }
    if (normalized.translations && Object.keys(normalized.translations).length) {
      currentSubtitle.translations = Object.assign({}, currentSubtitle.translations, normalized.translations);
    }

    currentSubtitle.ended = !!normalized.end;
    renderCurrentSubtitle();
    statusDiv.textContent = '已连接课堂 / Receiving subtitles';

    if (normalized.end) {
      pushHistorySnapshot();
    }
  }

  function setFontClass(className) {
    fullscreenContainer.classList.remove('font-default', 'font-medium', 'font-large');
    fullscreenContainer.classList.add(className);
  }

  function enterFocusMode() {
    fullscreenContainer.classList.add('focus-mode');
    exitFocusBtn.style.display = 'block';
  }

  function exitFocusMode() {
    fullscreenContainer.classList.remove('focus-mode');
    exitFocusBtn.style.display = 'none';
  }

  function setReviewMode(mode) {
    reviewMode = mode;
    [modeTeacher, modeStudent, modeDual].forEach(btn => btn.classList.remove('active'));
    if (mode === 'teacher') modeTeacher.classList.add('active');
    if (mode === 'student') modeStudent.classList.add('active');
    if (mode === 'dual') modeDual.classList.add('active');
  }

  function buildReviewText() {
    if (!historyList.length) return '暂无课堂记录。';
    const lines = historyList.slice().reverse().map(item => {
      const teacher = item.source || '';
      const student = item.translations?.[targetLang] || Object.values(item.translations || {})[0] || item.translation || '';
      if (reviewMode === 'teacher') return teacher;
      if (reviewMode === 'student') return student || teacher;
      return `老师: ${teacher}\n学生: ${student || '（暂无翻译）'}`;
    });
    return lines.join('\n\n');
  }

  function downloadReview() {
    if (!reviewText) return;
    const blob = new Blob([reviewText], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `class-review-${roomId || 'session'}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  if (!roomId) {
    sessionInputArea.style.display = 'block';
    mainContent.style.display = 'none';
  } else {
    sessionInputArea.style.display = 'none';
    mainContent.style.display = 'block';
    startConnection(roomId);
  }

  confirmSessionBtn.addEventListener('click', () => {
    const inputCode = roomCodeInput.value.trim();
    if (!inputCode) {
      alert('请输入课程码 / Please enter session code');
      return;
    }
    const url = new URL(location.href);
    url.searchParams.set('room', inputCode);
    location.href = url.toString();
  });

  roomCodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') confirmSessionBtn.click();
  });

  langSelect.value = targetLang;
  langSelect.addEventListener('change', () => {
    targetLang = langSelect.value;
    localStorage.setItem('student_lang', targetLang);
    nativeDiv.textContent = getPreferredTranslation(currentSubtitle.translations) || '';
    renderHistory();
  });

  btnDefault.addEventListener('click', () => setFontClass('font-default'));
  btnMedium.addEventListener('click', () => setFontClass('font-medium'));
  btnLarge.addEventListener('click', () => setFontClass('font-large'));
  btnFocus.addEventListener('click', enterFocusMode);
  exitFocusBtn.addEventListener('click', exitFocusMode);

  reviewHeader.addEventListener('click', () => {
    const willShow = reviewContent.style.display === 'none';
    reviewContent.style.display = willShow ? 'block' : 'none';
    reviewToggleText.textContent = willShow ? '▲ 点击展开/折叠 Click to expand' : '▼ 点击展开/折叠 Click to expand';
  });

  modeTeacher.addEventListener('click', () => setReviewMode('teacher'));
  modeStudent.addEventListener('click', () => setReviewMode('student'));
  modeDual.addEventListener('click', () => setReviewMode('dual'));
  generateBtn.addEventListener('click', () => {
    reviewText = buildReviewText();
    previewContent.textContent = reviewText;
    downloadBtn.disabled = !reviewText;
  });
  downloadBtn.addEventListener('click', downloadReview);

  minimizeBtn.addEventListener('click', () => {
    alert('当前版本保留了按钮入口；如需我再补完整悬浮窗逻辑，我可以继续给你。');
  });
  openWindowBtn.addEventListener('click', () => {
    window.open(location.href, '_blank', 'width=1100,height=800');
  });
  copyLinkBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(location.href);
      alert('链接已复制');
    } catch {
      alert('复制失败，请手动复制');
    }
  });

  renderHistory();
</script>
</body>
</html>
